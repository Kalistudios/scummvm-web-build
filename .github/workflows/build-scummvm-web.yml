name: Build ScummVM Web

# Isko manually chalane ke liye "Run workflow" button milega (Actions tab me),
# aur push karne pe bhi apne aap chalega.
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      # ScummVM ka source code (browser/emscripten version) laao
      - name: Checkout ScummVM (emscripten)
        uses: actions/checkout@v4
        with:
          repository: chkuendig/scummvm
          ref: emscripten
          path: scummvm

      # Icons ka data chahiye hota hai game list ke liye
      - name: Checkout ScummVM icons
        uses: actions/checkout@v4
        with:
          repository: chkuendig/scummvm-icons
          path: scummvm-icons

      # Build ke liye kuch basic tools
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3 python3-pip curl unzip pkg-config nasm

      # Yahan asli jaadu hota hai: GitHub ke computer pe engine + games ban jaate hain.
      # --enable-engine = kaun kaun se games chalane hain (sirf freeware waale)
      # --bundle-games  = kaun si games download karke andar daalni hain
      - name: Build ScummVM for the web
        working-directory: scummvm
        run: |
          chmod +x ./dists/emscripten/build.sh
          # 'got' (God of Thunder) hata diya - ye is engine me abhi nahi hai.
          # 'build' meta-task ki jagah steps khud likhe hain, aur aakhri
          # 'icons' step chhod diya (woh sirf cover-art thumbnails ke liye hai
          # aur wahi fail ho raha tha). Baaki sab - engine + games - ban jaayega.
          ./dists/emscripten/build.sh setup libs configure make games dist add-games \
            --verbose \
            --disable-all-engines \
            --enable-plugins \
            --default-dynamic \
            --enable-engine=sky,queen,lure,drascula,dreamweb,griffon,sword25,cge,cge2,parallaction,sludge,testbed \
            --bundle-games=sky/BASS-Floppy-1.3.zip,drascula/drascula-1.0.zip,queen/FOTAQ_Floppy.zip,lure

      # Ban gaya sab kuch is folder me. Ab isko download karne layak banao.
      - name: Upload the finished website
        uses: actions/upload-artifact@v4
        with:
          name: scummvm-web-build
          path: scummvm/build-emscripten
          if-no-files-found: error
