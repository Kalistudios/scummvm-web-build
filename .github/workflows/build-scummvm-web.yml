name: Build ScummVM Web

# Isko manually chalane ke liye "Run workflow" button milega (Actions tab me),
# aur push karne pe bhi apne aap chalega.
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      # ScummVM ka source code (browser/emscripten version) laao
      - name: Checkout ScummVM (emscripten)
        uses: actions/checkout@v4
        with:
          repository: chkuendig/scummvm
          ref: emscripten
          path: scummvm

      # Icons ka data chahiye hota hai game list ke liye
      - name: Checkout ScummVM icons
        uses: actions/checkout@v4
        with:
          repository: chkuendig/scummvm-icons
          path: scummvm-icons

      # Build ke liye kuch basic tools
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3 python3-pip curl unzip pkg-config nasm

      # Yahan asli jaadu hota hai: GitHub ke computer pe engine + games ban jaate hain.
      # --enable-engine = kaun kaun se games chalane hain (sirf freeware waale)
      # --bundle-games  = kaun si games download karke andar daalni hain
      - name: Build ScummVM for the web
        working-directory: scummvm
        run: |
          chmod +x ./dists/emscripten/build.sh
          # 'got' (God of Thunder) hata diya - ye is engine me abhi nahi hai.
          # Sirf 'dist' tak chala rahe hain. Uske baad ke do steps - 'add-games'
          # (Puppeteer robot-browser) aur 'icons' (cover art) - CI pe tootte hain
          # aur game khelne ke liye zaroori bhi nahi. Asli ScummVM demo bhi inhe
          # CI pe skip karta hai. make/games/dist pichli baar chal chuke the.
          ./dists/emscripten/build.sh setup libs configure make games dist \
            --verbose \
            --disable-all-engines \
            --enable-plugins \
            --default-dynamic \
            --enable-engine=sky,queen,lure,drascula,dreamweb,griffon,sword25,cge,cge2,parallaction,sludge,testbed \
            --bundle-games=sky/BASS-Floppy-1.3.zip,drascula/drascula-1.0.zip,queen/FOTAQ_Floppy.zip,lure

      # Launcher me 4 games apne aap dikhein iske liye ek scummvm.ini likho.
      # (Ye normally 'add-games' step banata, jo CI pe toot raha tha - to hum
      # khud bana rahe hain. Paths bilkul waise hain jaise bundle-games banata hai.)
      - name: Write scummvm.ini (games launcher me dikhane ke liye)
        working-directory: scummvm/build-emscripten
        run: |
          cat > scummvm.ini <<'EOF'
          [scummvm]
          always_run_fallback_detection_extern=false

          [sky]
          platform=pc
          gameid=sky
          description=Beneath a Steel Sky (Floppy/DOS)
          extra=Floppy
          path=/data/games/sky-BASS-Floppy-1.3
          engineid=sky
          guioptions=sndNoSpeech lang_English (GB)

          [drascula]
          platform=pc
          gameid=drascula
          description=Drascula: The Vampire Strikes Back (DOS/English)
          language=en
          path=/data/games/drascula-1.0
          engineid=drascula
          guioptions=sndNoMIDI sndLinkSpeechToSfx gameOption1 gameOption2 lang_English

          [queen]
          platform=pc
          gameid=queen
          description=Flight of the Amazon Queen (Floppy/DOS/English)
          language=en
          extra=Floppy
          path=/data/games/queen-FOTAQ_Floppy/FOTAQ_Floppy
          engineid=queen
          guioptions=sndNoSpeech lang_English

          [lure]
          platform=pc
          gameid=lure
          description=Lure of the Temptress (VGA/DOS/English)
          language=en
          extra=VGA
          path=/data/games/lure-1.1/lure
          engineid=lure
          guioptions=sndNoSpeech gameOption1 gameOption2 lang_English
          EOF
          echo "scummvm.ini likh diya:"
          cat scummvm.ini

      # Ban gaya sab kuch is folder me. Ab isko download karne layak banao.
      - name: Upload the finished website
        uses: actions/upload-artifact@v4
        with:
          name: scummvm-web-build
          path: scummvm/build-emscripten
          if-no-files-found: error
